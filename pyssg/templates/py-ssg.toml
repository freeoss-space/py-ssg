[py-ssg]
name = "Blog Name"
url = "https://yourblog.dev"
description = "My blog"
cache = true

[py-ssg.server]
port = 8000

[py-ssg.syntax]
enabled = true
theme_light = "friendly"
theme_dark = "monokai"

[[py-ssg.authors]]
name = "Your Name"
email = "your@email.com"

[[py-ssg.feeds]]
title = "Blog Name"
description = "My blog feed"
output = "feed.xml"

# Example: a tag-filtered feed
# [[py-ssg.feeds]]
# title = "Blog Name - Tech"
# description = "Tech posts"
# output = "tech.xml"
# tags = ["tech"]
